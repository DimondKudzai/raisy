<!DOCTYPE html>
<html>
<head>
    <title>RAISY</title>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="manifest" href="/static/manifest.json">
     <meta name="theme-color" content="#0f172a">
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 50px auto;
            width: 50%;
            border-radius: 12px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }

        button {
            background: #22c55e;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
    <link rel="icon" type="image/jpg" href="{{url_for('static', filename='ic-1.png')}}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    
</head>
<body>

<h1>🏥 Resource Allocation Intelligence System</h1>

<div class="card">

<form action="/upload" method="post" enctype="multipart/form-data">

    <input type="file" name="file" required>

    <input type="number" name="clusters" value="3" min="2" max="10">

    <button type="submit">Run AI Analysis</button>

</form>

</div>

</body>

<script type="text/javascript">
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  // Prevent the mini-infobar from appearing
  e.preventDefault();
  // Stash the event so it can be triggered later
  deferredPrompt = e;
  // Show your custom install button
  showInstallButton();
});

function showInstallButton() {
  const installButton = document.getElementById('install-button');
  installButton.style.display = 'block';
  installButton.addEventListener('click', () => {
    // Show the install prompt
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        console.log('User accepted the install prompt');
      } else {
        console.log('User dismissed the install prompt');
      }
      deferredPrompt = null;
    });
  });
}

</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("SW failed", err));
}
</script>

</html>
