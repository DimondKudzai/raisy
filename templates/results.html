<!DOCTYPE html>
<html>
<head>
    <title>HRIS Pro Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        .title {
            font-size: 22px;
            margin-bottom: 10px;
        }

        button {
            background: #22c55e;
            border: none;
            padding: 10px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        canvas {
            max-height: 250px;
        }
    </style>
</head>

<body>

<h1>🏥 Health Resource Intelligence Dashboard</h1>
<a href="https://raisy.onrender.com/" ><h2>Run Another</h2></a>
<div class="grid">

{% for item in summary %}

<div class="card">

    <div class="title">
        {{ item.cluster_name if item.cluster_name else "Cluster " ~ item.cluster }}
    </div>

    <p><b>Patients:</b> {{ item.size }}</p>
    <p><b>Average Age:</b> {{ item.avg_age }}</p>

    <p><b>AI Recommendation:</b> {{ item.recommendation }}</p>

    <!-- PIE CHART -->
    <canvas id="pie-{{ item.cluster }}"></canvas>

    <!-- BAR CHART -->
    <canvas id="bar-{{ item.cluster }}"></canvas>

    <script type="application/json" id="data-{{ item.cluster }}">
        {{ item.top_diseases | tojson }}
    </script>

</div>

{% endfor %}

</div>

<button onclick="downloadReport()">📄 Download Report</button>

<script>
window.onload = function () {

    {% for item in summary %}

    const data{{ item.cluster }} = JSON.parse(
        document.getElementById("data-{{ item.cluster }}").textContent
    );

    const labels = Object.keys(data{{ item.cluster }});
    const values = Object.values(data{{ item.cluster }});

    // PIE CHART
    new Chart(document.getElementById("pie-{{ item.cluster }}"), {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                label: 'Disease Distribution',
                data: values
            }]
        }
    });

    // BAR CHART (comparison view)
    new Chart(document.getElementById("bar-{{ item.cluster }}"), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Cases',
                data: values
            }]
        },
        options: {
            plugins: {
                legend: { display: false }
            }
        }
    });

    {% endfor %}

};
</script>

<script>
function downloadReport() {
    window.print();
}
</script>

</body>
</html>
