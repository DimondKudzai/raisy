<!DOCTYPE html>
<html>
<head>
    <title>RAISY Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>AI Cluster Results <a href="{{ url_for('upload_file') }}" style="text-decoration: none; color: brown">
    &#160  Rerun 
    </h1>
</a>
{% for item in summary %}

<div style="border:1px solid #ccc; padding:15px; margin:15px;">

    <h2>Cluster {{ item.cluster }}</h2>

    <p><b>Patients:</b> {{ item.size }}</p>
    <p><b>Average Age:</b> {{ item.avg_age }}</p>
    <p><b>Recommendation:</b> {{ item.recommendation }}</p>

    <canvas id="chart{{ item.cluster }}"></canvas>

</div>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  // Prevent the mini-infobar from appearing
  e.preventDefault();
  // Stash the event so it can be triggered later
  deferredPrompt = e;
  // Show your custom install button
  showInstallButton();
});

function showInstallButton() {
  const installButton = document.getElementById('install-button');
  installButton.style.display = 'block';
  installButton.addEventListener('click', () => {
    // Show the install prompt
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        console.log('User accepted the install prompt');
      } else {
        console.log('User dismissed the install prompt');
      }
      deferredPrompt = null;
    });
  });
}


const ctx{{ item.cluster }} = document.getElementById('chart{{ item.cluster }}');

new Chart(ctx{{ item.cluster }}, {
    type: 'pie',
    data: {
        labels: Object.keys({{ item.top_diseases | tojson }}),
        datasets: [{
            label: 'Diseases',
            data: Object.values({{ item.top_diseases | tojson }})
        }]
    }
});


</script>

{% endfor %}

</body>
</html>
