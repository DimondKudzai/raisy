<!DOCTYPE html>
<html>
<head>
    <title>RAISY Pro Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    
    <style>
    body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
    }
    
    h1 {
    text-align: center;
    }
    
    .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-top: 20px;
    }
    
    .card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    
    .title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
    }
    
    canvas {
    width: 100% !important;
    max-height: 260px;
    margin-top: 10px;
    }
    
    a {
    color: #a78bfa;
    text-decoration: none;
    }
    
    button {
    background: #22c55e;
    border: none;
    padding: 10px 15px;
    color: white;
    cursor: pointer;
    border-radius: 6px;
    margin-top: 20px;
    }
    </style>
</head>

<body>

<h1>🏥 Health Resource Intelligence Dashboard</h1>
<a href="https://raisy.onrender.com/">
    <h3>🔁 Run Another Analysis</h3>
</a>
<div>

{% for item in summary %}

<div class="card">

    <div class="title">
        Cluster {{ item.cluster }}
    </div>

    <p><b>Patients:</b> {{ item.size }}</p>
    <p><b>Average Age:</b> {{ item.avg_age }}</p>

    <p><b>Recommendation:</b> {{ item.recommendation }}</p>

    <!-- DISEASE CHART -->
    <canvas id="disease-{{ item.cluster }}"></canvas>

    
    <canvas id="location-{{ item.cluster }}"></canvas>

    <script type="application/json" id="data-disease-{{ item.cluster }}">
        {{ item.top_diseases | tojson }}
    </script>

    <script type="application/json" id="data-location-{{ item.cluster }}">
        {{ item.top_locations | tojson }}
    </script>

</div>

{% endfor %}

</div>

<button onclick="window.print()">📄 Download / Print Report</button>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const summaries = {{ summary | tojson }};

    summaries.forEach(function(item) {

        // =======================
        // DISEASE CHART
        // =======================
        const diseaseData = item.top_diseases;

        new Chart(document.getElementById(`disease-${item.cluster}`), {
            type: 'pie',
            data: {
                labels: Object.keys(diseaseData),
                datasets: [{
                    data: Object.values(diseaseData)
                }]
            }
        });

        // =======================
       
        // =======================
        const locationData = item.top_locations;

        new Chart(document.getElementById(`location-${item.cluster}`), {
            type: 'bar',
            data: {
                labels: Object.keys(locationData),
                datasets: [{
                    label: 'Patients by Location',
                    data: Object.values(locationData)
                }]
            },
            options: {
                plugins: {
                    legend: { display: false }
                }
            }
        });

    });

});
</script>

</body>
</html>
