<!DOCTYPE html>
<html>
<head>
  <title>Cimas Segmenter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#0066cc">
  <style>
    body { font-family: Arial; padding: 20px; max-width: 800px; margin: auto; }
    button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  </style>
</head>
<body>
  <h2>Cimas Patient Segmentation</h2>
  <input type="file" id="file" accept=".csv,.xlsx"><br><br>
  <label>Segments: <input type="number" id="clusters" value="3" min="2" max="24"></label>
  <button onclick="runSegment()">Run Analysis</button>
  <div id="result"></div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js');

async function runSegment() {
  const formData = new FormData();
  const file = document.getElementById('file').files[0];
  if (file) formData.append('file', file);
  formData.append('clusters', document.getElementById('clusters').value);

  const res = await fetch('/segment', { method: 'POST', body: formData });
  const data = await res.json();

  let html = '<table><tr><th>Segment</th><th>Avg Age</th><th>Diabetes %</th><th>Hypertension %</th><th>Avg Visits</th><th>Top Location</th><th>Resource Recomandation</th></tr>';
  data.forEach((row, i) => {
    html += `<tr><td>${i}</td><td>${row.age}</td><td>${(row.diabetes*100).toFixed(0)}%</td><td>${(row.hypertension*100).toFixed(0)}%</td><td>${row.visits_per_year}</td><td>${row.location}</td><td>${row.recommendation}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
